services:
  mongodb:
    image: mongo:7
    container_name: reversecode-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: reversecode_arena
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: reversecode-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  sandbox:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: reversecode-sandbox
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec,nosuid
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.workers.judge_worker
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=reversecode_arena
      - REDIS_URL=redis://redis:6379
      - SANDBOX_URL=http://sandbox:8080
      - WORKER_ID=worker-0
    depends_on:
      - redis
      - mongodb
      - sandbox
    restart: unless-stopped
    profiles:
      - worker

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reversecode-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=reversecode_arena
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_KEY=change-this-to-a-secure-random-string-in-production
      - SANDBOX_URL=http://sandbox:8080
      - DEBUG=true
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/submissions:/app/submissions
    depends_on:
      - mongodb
      - redis
      - sandbox
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reversecode-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data: